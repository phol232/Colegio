server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SPA entry: nunca cachear HTML. Si el navegador conserva un index.html
    # viejo, sigue pidiendo chunks JS antiguos (marcados immutable 1 año)
    # y tras un redeploy parece "volver" la UI anterior.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Solo assets con hash de Vite (/assets/xxx-[hash].js) pueden ser immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
