services:
  nginx:
    image: nginx:alpine
    container_name: academic_nginx
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - TZ=America/Lima
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - academic_network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: academic_frontend
    environment:
      - TZ=America/Lima
    networks:
      - academic_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: academic_backend_api
    command: ["node", "dist/main.js"]
    env_file:
      - .env
    environment:
      - PORT=3000
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=academic_oltp
      - DB_USERNAME=academic
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_OLAP_HOST=pgbouncer
      - DB_OLAP_PORT=6432
      - DB_OLAP_DATABASE=academic_olap
      - DB_OLAP_USERNAME=academic
      - DB_OLAP_PASSWORD=${DB_PASSWORD}
      - REDIS_CACHE_HOST=redis-cache
      - REDIS_CACHE_PORT=6379
      - REDIS_QUEUE_HOST=redis-queue
      - REDIS_QUEUE_PORT=6379
      - TZ=America/Lima
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - academic_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  backend-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: academic_backend_worker
    command: ["node", "dist/worker.main.js"]
    env_file:
      - .env
    environment:
      - PORT=3000
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=academic_oltp
      - DB_USERNAME=academic
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_OLAP_HOST=pgbouncer
      - DB_OLAP_PORT=6432
      - DB_OLAP_DATABASE=academic_olap
      - DB_OLAP_USERNAME=academic
      - DB_OLAP_PASSWORD=${DB_PASSWORD}
      - REDIS_CACHE_HOST=redis-cache
      - REDIS_CACHE_PORT=6379
      - REDIS_QUEUE_HOST=redis-queue
      - REDIS_QUEUE_PORT=6379
      - TZ=America/Lima
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - academic_network
    restart: unless-stopped

  backend-scheduler:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: academic_backend_scheduler
    command: ["node", "dist/scheduler.main.js"]
    env_file:
      - .env
    environment:
      - PORT=3000
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=academic_oltp
      - DB_USERNAME=academic
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_OLAP_HOST=pgbouncer
      - DB_OLAP_PORT=6432
      - DB_OLAP_DATABASE=academic_olap
      - DB_OLAP_USERNAME=academic
      - DB_OLAP_PASSWORD=${DB_PASSWORD}
      - REDIS_CACHE_HOST=redis-cache
      - REDIS_CACHE_PORT=6379
      - REDIS_QUEUE_HOST=redis-queue
      - REDIS_QUEUE_PORT=6379
      - TZ=America/Lima
    depends_on:
      redis-queue:
        condition: service_started
      backend-worker:
        condition: service_started
    networks:
      - academic_network
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    container_name: academic_db_init
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: America/Lima
    volumes:
      - ./Database:/database:ro
      - ./Database/docker-init/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - academic_network
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: academic_postgres
    environment:
      POSTGRES_USER: academic
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
      TZ: America/Lima
      PGTZ: America/Lima
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - ./Database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: 256mb
    networks:
      - academic_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academic"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: academic_pgbouncer
    environment:
      DATABASE_URLS: >-
        postgres://academic:${DB_PASSWORD}@postgres:5432/academic_oltp,
        postgres://academic:${DB_PASSWORD}@postgres:5432/academic_olap
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: 6432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 600
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
      ADMIN_USERS: academic
      STATS_USERS: academic
      TZ: America/Lima
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - academic_network
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    container_name: academic_redis_cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      - TZ=America/Lima
    ports:
      - "6379:6379"
    networks:
      - academic_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-queue:
    image: redis:7-alpine
    container_name: academic_redis_queue
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    environment:
      - TZ=America/Lima
    volumes:
      - redis_queue_data:/data
    ports:
      - "6380:6379"
    networks:
      - academic_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  academic_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_queue_data:
    driver: local
